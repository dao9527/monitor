name: Steam 库存监控


on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'   # 每小时的第 0,10,20...分钟运行
    - cron: '0 4 * * *'                   # 每天 UTC 04:00 (北京时间12:00) 发送报告
  workflow_dispatch:


jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖（使用清华源加速）
        run: |
          pip install --upgrade pip
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple requests

      - name: 运行监控任务（非报告时间）
        if: github.event.schedule != '0 4 * * *'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python monitor.py

      - name: 运行每日报告（北京时间12:00）
        if: github.event.schedule == '0 4 * * *'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python monitor.py report

      - name: 提交数据文件变更
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "更新库存数据 [skip ci]"
          file_pattern: '*.json'
